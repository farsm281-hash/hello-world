<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World • My First App</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 2rem;
    }
    h1 {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.3rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1.1rem;
      transition: transform 0.3s;
    }
    .btn:hover {
      transform: scale(1.05);
    }
    footer {
      margin-top: 3rem;
      font-size: 1rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Hello World!</h1>
    <p>Your website is now successfully hosted on <strong>AWS Amplify</strong>.</p>
    <a href="https://github.com/farsm281-hash/hello-world" class="btn" target="_blank">
      View on GitHub
    </a>
    <footer>
      Made with ❤️ using AWS Amplify • Automatically deployed
    </footer>
  </div>
</body>
</html>
